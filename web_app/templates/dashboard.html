<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; 
                  padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .pose-card { background: white; padding: 15px; margin: 10px; border-radius: 10px; 
                     display: inline-block; width: 250px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .pose-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .success { border-left: 4px solid #4caf50; }
        .warning { border-left: 4px solid #ff9800; }
        .danger { border-left: 4px solid #f44336; }
        button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Welcome, {{ user.name }}!</h2>
        <p>Trimester: {{ user.trimester }} | Week {{ user.weeks }}</p>
    </div>
    <h3>Recommended Poses</h3>
    <div>
        {% for pose in poses %}
        <div class="pose-card {{ pose.color }}" onclick="selectPose('{{ pose.name }}')">
            <h4>{{ pose.name.replace('_', ' ') }}</h4>
            <p>{{ pose.message }}</p>
        </div>
        {% endfor %}
    </div>
    <button onclick="logout()">Logout</button>
    <script>
        function selectPose(poseName) {
            window.location.href = `/pose/${encodeURIComponent(poseName)}`;
        }
        function logout() { window.location.href = '/'; }
    </script>
</body>
</html>
